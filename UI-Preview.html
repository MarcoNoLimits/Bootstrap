<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ASR UI Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url('https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=1200') center/cover;
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.15);
      backdrop-filter: blur(10px);
      z-index: 0;
    }
    .glass-panel {
      position: relative;
      z-index: 1;
      width: 920px;
      height: 500px;
      background: rgba(14, 42, 78, 0.58);
      border-radius: 24px;
      border-top-right-radius: 24px;
      border-bottom-right-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 0;
      display: flex;
      flex-direction: column;
      box-shadow: 0 16px 48px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .row {
      flex: 1;
      display: flex;
      flex-direction: row;
      min-height: 0;
    }
    .center-panel {
      flex: 2;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: space-between;
    }
    .center-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      padding-top: 24px;
      padding-left: 24px;
    }
    .brand-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      align-self: center;
      margin-bottom: 40px;
    }
    .brand-logo {
      width: 48px;
      height: 48px;
      margin-right: 14px;
      object-fit: contain;
    }
    .brand-name {
      font-size: 20px;
      font-weight: 700;
      font-style: italic;
      color: rgba(255,255,255,0.98);
      text-align: left;
      letter-spacing: 2px;
    }
    .welcome-title {
      font-size: 28px;
      font-weight: 700;
      color: rgba(255,255,255,0.98);
      margin-bottom: 28px;
      text-align: left;
    }
    .sub-title {
      font-size: 22px;
      color: rgba(235, 242, 255, 0.9);
      margin-bottom: 72px;
      text-align: left;
    }
    .button-row {
      display: flex;
      gap: 48px;
      align-self: center;
    }
    .primary-btn, .secondary-btn {
      width: 200px;
      height: 62px;
      border-radius: 14px;
      font-size: 25px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    .primary-btn {
      background: rgba(50, 120, 200, 0.8);
    }
    .primary-btn:hover { background: rgba(70, 140, 220, 0.9); }
    .secondary-btn {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.35);
    }
    .secondary-btn:hover { background: rgba(255,255,255,0.08); }
    .right-panel {
      width: 240px;
      margin-left: 0;
      background: rgba(14, 42, 78, 0.38);
      border-left: 1px solid rgba(255,255,255,0.38);
      border-top-right-radius: 24px;
      border-bottom-right-radius: 24px;
      box-shadow: 2px 0 8px rgba(0,0,0,0.15);
      padding: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .settings-header {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    .settings-icon { font-size: 20px; margin-right: 8px; color: rgba(180, 220, 255, 0.95); }
    .settings-icon-img {
      width: 22px; height: 22px; margin-right: 10px;
      object-fit: contain; filter: brightness(0) invert(1); opacity: 0.9;
    }
    .settings-label { font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.98); }
    .search-field {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: #fff;
      margin-bottom: 24px;
      font-family: inherit;
      font-size: 15px;
    }
    .search-field::placeholder { color: rgba(255,255,255,0.5); }
    .nav-scroll {
      flex: 1;
      overflow-y: auto;
    }
    .nav-item-row {
      display: flex;
      align-items: center;
      margin-top: 4px;
      padding: 6px 8px;
      border-radius: 8px;
    }
    .nav-item-row:hover { background: rgba(255,255,255,0.06); }
    .nav-icon {
      font-size: 20px;
      color: rgba(180, 220, 255, 0.9);
      width: 28px;
      margin-right: 10px;
    }
    .nav-icon-img {
      width: 22px; height: 22px; margin-right: 12px;
      object-fit: contain; filter: brightness(0) invert(1); opacity: 0.9;
    }
    .nav-item {
      flex: 1;
      background: none;
      border: none;
      color: rgba(255,255,255,0.95);
      font-size: 17px;
      font-weight: 400;
      text-align: left;
      cursor: pointer;
      font-family: inherit;
    }
    .bottom-bar {
      width: 100%;
      height: 54px;
      background: rgba(14, 42, 78, 0.38);
      border-top: 1px solid rgba(255,255,255,0.28);
      box-shadow: 0 -2px 8px rgba(0,0,0,0.12);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: 20px;
      padding-right: 20px;
    }
    .bottom-bar-icons {
      display: flex;
      align-items: center;
      gap: 28px;
    }
    .bottom-bar-icon {
      width: 28px;
      height: 28px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }
    .icon-placeholder {
      font-size: 22px;
      color: rgba(255,255,255,0.9);
    }
    .bottom-bar .icon-placeholder:first-child {
      font-size: 28px;
    }
  </style>
</head>
<body>
  <div class="glass-panel">
    <div class="row">
      <div class="center-panel">
        <div class="center-content">
          <div class="brand-row">
            <img src="images/HoloAssistLogo.png" alt="HOLOASSIST" class="brand-logo">
            <p class="brand-name">HOLOASSIST</p>
          </div>
          <p class="welcome-title">Conversation Companion</p>
          <p class="sub-title">Intelligent Real-Time Communication Assistance.</p>
          <div class="button-row">
            <button type="button" class="primary-btn">Start</button>
            <button type="button" class="secondary-btn">Settings</button>
          </div>
        </div>
        <div class="bottom-bar">
          <span class="icon-placeholder">☰</span>
          <div class="bottom-bar-icons">
            <img src="images/volume.svg" alt="Volume" class="bottom-bar-icon">
            <img src="images/microphone.svg" alt="Microphone" class="bottom-bar-icon">
            <img src="images/refresh.svg" alt="Refresh" class="bottom-bar-icon">
          </div>
        </div>
      </div>
      <div class="right-panel">
        <div class="settings-header">
          <img src="images/search.svg" alt="Search" class="settings-icon-img">
          <span class="settings-label">Settings</span>
        </div>
        <input type="text" class="search-field" placeholder="Search Settings...">
        <div class="nav-scroll">
          <div class="nav-item-row"><img src="images/ASR.svg" alt="" class="nav-icon-img"><button type="button" class="nav-item">ASR</button></div>
          <div class="nav-item-row"><img src="images/language.svg" alt="" class="nav-icon-img"><button type="button" class="nav-item">Translation</button></div>
          <div class="nav-item-row"><img src="images/sign-language.svg" alt="" class="nav-icon-img"><button type="button" class="nav-item">Sign Language</button></div>
          <div class="nav-item-row"><img src="images/notification.svg" alt="" class="nav-icon-img"><button type="button" class="nav-item">Notifications</button></div>
          <div class="nav-item-row"><img src="images/privacy.svg" alt="" class="nav-icon-img"><button type="button" class="nav-item">Privacy</button></div>
          <div class="nav-item-row"><img src="images/help.svg" alt="" class="nav-icon-img"><button type="button" class="nav-item">Help</button></div>
          <div class="nav-item-row"><img src="images/about.svg" alt="" class="nav-icon-img"><button type="button" class="nav-item">About</button></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
